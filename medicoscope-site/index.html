<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interstellar Exploration</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            height: 800vh;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        #exploration-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        .overlay-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s, transform 0.8s;
            text-align: center;
            font-size: 3rem;
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        /* ── Skip Button ── */
        #skip-btn {
            position: fixed;
            bottom: 36px;
            right: 36px;
            z-index: 100;

            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 26px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s, transform 0.2s, opacity 0.5s;
            opacity: 1;
        }

        #skip-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        #skip-btn:active {
            transform: translateY(0px) scale(0.97);
        }

        /* Arrow icon inside the button */
        #skip-btn svg {
            flex-shrink: 0;
            transition: transform 0.3s;
        }
        #skip-btn:hover svg {
            transform: translateX(4px);
        }

        /* Hide button once skipped / at end */
        #skip-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Thin animated progress bar along the bottom edge */
        #progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 2px;
            width: 0%;
            background: linear-gradient(90deg, rgba(255,255,255,0.2), rgba(255,255,255,0.7));
            z-index: 99;
            transition: width 0.1s linear;
        }

        /* Fade-out overlay for seamless transition to Flutter app */
        #fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFF5F0 0%, #FFE8D6 100%);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease-in-out;
        }

        #fade-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>
<body>

    <div id="exploration-container">
        <canvas id="hero-canvas"></canvas>
    </div>

    <div class="overlay-text" id="text-1"></div>
    <div class="overlay-text" id="text-2"></div>
    <div class="overlay-text" id="text-3"></div>

    <!-- Skip Button -->
    <button id="skip-btn" aria-label="Skip to end">
        Skip
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="13 17 18 12 13 7"></polyline>
            <polyline points="6 17 11 12 6 7"></polyline>
        </svg>
    </button>

    <!-- Progress bar -->
    <div id="progress-bar"></div>

    <!-- Fade overlay for seamless transition to Flutter app -->
    <div id="fade-overlay"></div>

    <script>
        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d");

        const frameCount = 826;
        let hasRedirected = false;

        // Seamless transition to Flutter app
        function transitionToApp() {
            if (hasRedirected) return;
            hasRedirected = true;

            const overlay = document.getElementById('fade-overlay');
            overlay.classList.add('active');

            // Navigate after fade completes
            setTimeout(() => {
                window.location.href = 'build/web/index.html';
            }, 1000);
        }

        const currentFrame = index => (
            `assets/walkthrough/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`
        );

        const images = [];
        const exploration = { frame: 0 };

        console.log("Starting image preload...");
        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = currentFrame(i);
            img.onload = () => { if (i === 1) render(); };
            img.onerror = () => console.error("Failed to load:", img.src);
            images.push(img);
        }

        function render() {
            const img = images[exploration.frame];
            if (!img || !img.complete) return;

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const iw = img.width;
            const ih = img.height;
            const cw = canvas.width;
            const ch = canvas.height;

            const scale = Math.max(cw / iw, ch / ih);
            const nw = iw * scale;
            const nh = ih * scale;

            context.clearRect(0, 0, cw, ch);
            context.drawImage(img, (cw - nw) / 2, (ch - nh) / 2, nw, nh);
        }

        // ── Progress bar & text updater on scroll ──
        window.addEventListener("scroll", () => {
            const html = document.documentElement;
            const scrollTop = html.scrollTop;
            const maxScrollTop = html.scrollHeight - window.innerHeight;
            const scrollFraction = scrollTop / maxScrollTop;

            const frameIndex = Math.min(
                frameCount - 1,
                Math.floor(scrollFraction * frameCount)
            );

            exploration.frame = frameIndex;
            requestAnimationFrame(render);

            // Update progress bar
            document.getElementById('progress-bar').style.width = (scrollFraction * 100) + '%';

            // Hide skip button when near or at the end
            const skipBtn = document.getElementById('skip-btn');
            if (scrollFraction >= 0.97) {
                skipBtn.classList.add('hidden');
            } else {
                skipBtn.classList.remove('hidden');
            }

            updateText('text-1', scrollFraction, 0.05, 0.2);
            updateText('text-2', scrollFraction, 0.35, 0.55);
            updateText('text-3', scrollFraction, 0.7, 0.9);

            // Auto-redirect when scroll reaches the end
            if (scrollFraction >= 0.99) {
                transitionToApp();
            }
        });

        function updateText(id, fraction, start, end) {
            const el = document.getElementById(id);
            if (fraction > start && fraction < end) {
                el.style.opacity = 1;
                el.style.transform = "translate(-50%, -50%) scale(1.1)";
            } else {
                el.style.opacity = 0;
                el.style.transform = "translate(-50%, -50%) scale(0.9)";
            }
        }

        // ── Skip Button: smooth auto-walkthrough then transition ──
        let isAutoPlaying = false;
        document.getElementById('skip-btn').addEventListener('click', () => {
            if (isAutoPlaying) return;
            isAutoPlaying = true;

            // Hide skip button immediately
            document.getElementById('skip-btn').classList.add('hidden');

            // Fast-forward through remaining frames smoothly
            const startFrame = exploration.frame;
            const totalFrames = frameCount - 1;
            const remainingFrames = totalFrames - startFrame;
            const duration = Math.min(3000, remainingFrames * 5); // ~3s max
            const startTime = performance.now();

            function autoPlay(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                // Ease-in-out for smooth feel
                const eased = progress < 0.5
                    ? 2 * progress * progress
                    : 1 - Math.pow(-2 * progress + 2, 2) / 2;

                const frame = Math.floor(startFrame + eased * remainingFrames);
                exploration.frame = Math.min(frame, totalFrames);
                render();

                // Update progress bar during auto-play
                document.getElementById('progress-bar').style.width =
                    ((exploration.frame / totalFrames) * 100) + '%';

                if (progress < 1) {
                    requestAnimationFrame(autoPlay);
                } else {
                    // Auto-play done — transition to Flutter app
                    transitionToApp();
                }
            }

            requestAnimationFrame(autoPlay);
        });

        window.addEventListener('resize', render);
    </script>
</body>
</html>
